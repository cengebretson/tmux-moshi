name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y tmux shellcheck

      - name: Shellcheck
        run: shellcheck scripts/moshi-status scripts/moshi-toggle scripts/moshi-seed-pairing tests/check.sh tmux-moshi.tmux

      - name: Run tests
        run: tests/check.sh

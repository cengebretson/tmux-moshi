# Pre-commit hooks for tmux-moshi. Enable once with `pre-commit install`.
# Requires the pre-commit framework (https://pre-commit.com) and shellcheck +
# tmux on PATH (the hooks run them via the system environment).
repos:
  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        files: '^(scripts/.*|tests/check\.sh|tmux-moshi\.tmux)$'

      - id: tmux-moshi-tests
        name: tmux-moshi integration tests
        entry: tests/check.sh
        language: script
        pass_filenames: false
        always_run: true
